# 定义所有要运行的服务容器
services:
  
  # ==================== MySQL 数据库服务 ====================
  mysql:
    # 使用的 Docker 镜像及版本
    # mysql:8.0 - MySQL 8.0 版本官方镜像
    image: mysql:8.0
    
    # 容器名称，方便在命令行中引用
    # 可以通过 docker stop book-mysql 来停止
    container_name: book-mysql
    
    # 重启策略：除非手动停止，否则总是自动重启
    # 服务器重启后容器会自动启动
    restart: unless-stopped
    
    # 环境变量，传递给容器内部
    environment:
      # MySQL root 用户密码（最高权限）
      MYSQL_ROOT_PASSWORD: root123
      # 启动时自动创建的数据库名
      MYSQL_DATABASE: book_trading
      # 创建额外用户（非 root 用户，更安全）
      MYSQL_USER: bookuser
      # 额外用户的密码
      MYSQL_PASSWORD: book123
    
    # 端口映射：主机端口:容器端口
    # 访问主机的 3306 端口会被转发到容器的 3306 端口
    ports:
      - "3306:3306"
    
    # 数据卷挂载：主机卷名:容器内路径
    # 将数据持久化到主机，删除容器数据不会丢失
    volumes:
      - mysql_data:/var/lib/mysql
    
    # 覆盖容器默认启动命令
    # 设置 MySQL 字符集为 utf8mb4（支持 emoji 和中文）
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ==================== Redis 缓存服务 ====================
  redis:
    # Redis 7.0 版本基于 Alpine Linux（体积更小，约 30MB）
    image: redis:7-alpine
    
    container_name: book-redis
    
    restart: unless-stopped
    
    ports:
      - "6379:6379"  # Redis 默认端口
    
    volumes:
      - redis_data:/data  # Redis 数据持久化
    
    # 启动 Redis 并开启 AOF 持久化模式
    # appendonly yes：每次写操作都记录日志，数据更安全
    command: redis-server --appendonly yes

  # ==================== phpMyAdmin 数据库管理工具 ====================
  phpmyadmin:
    # phpMyAdmin 官方镜像（Web 界面管理 MySQL）
    image: phpmyadmin/phpmyadmin
    
    container_name: book-phpmyadmin
    
    restart: unless-stopped
    
    environment:
      # 要连接的 MySQL 服务名（即上面的 mysql 服务）
      PMA_HOST: mysql
      # MySQL 端口
      PMA_PORT: 3306
      # 允许连接到任意服务器（不限制）
      PMA_ARBITRARY: 1
    
    ports:
      - "8080:80"  # 访问 http://localhost:8080 打开 phpMyAdmin
    
    # 依赖关系：确保 mysql 服务先启动
    depends_on:
      - mysql

  # ==================== Redis Commander 管理工具 ====================

# ==================== 数据卷定义 ====================
# 声明需要创建的数据卷（用于持久化数据）
volumes:
  mysql_data:   # MySQL 数据存储
  redis_data:   # Redis 数据存储
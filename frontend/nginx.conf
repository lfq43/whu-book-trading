server {
  listen 80;
  listen 8000;
  server_name _;
  root /usr/share/nginx/html; # 查找静态文件的目录
  index index.html;

  # 静态资源和前端路由
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 反向代理后端 API 请求
  location /api/ {
    proxy_pass http://book-backend:8082/api/;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 上传文件代理（如文件访问）
  location ^~ /uploads/ {
        # 方案1：代理到后端（文件存在后端）
    proxy_pass http://book-backend:8082/uploads/;

        # 方案2：直接服务本地文件（如果文件存在Nginx服务器）
        # root /path/to/upload/dir;  # 文件实际存储路径
        # auto index off;  # 关闭目录列表

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

        # 文件相关设置
    client_max_body_size 100M;  # 允许上传大文件
    expires 30d;  # 缓存30天
   }

   location ~* \.(ico|css|js)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

}
